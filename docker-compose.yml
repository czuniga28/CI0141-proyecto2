services:
  dw:
    image: postgres:16-alpine
    container_name: ecci_dw
    environment:
      POSTGRES_DB: ecci_dw
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    ports:
      - "5432:5432"
    volumes:
      - dw_data:/var/lib/postgresql/data
      - ./sql/ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d ecci_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Carga de datos one-shot: corre el pipeline ETL contra el DW y termina.
  # Es idempotente (full reload: TRUNCATE ... RESTART IDENTITY en staging y facts),
  # así que se puede re-correr en cada `up`.
  etl:
    image: python:3.11-slim
    container_name: ecci_etl
    working_dir: /app
    environment:
      POSTGRES_HOST: dw
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ecci_dw
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    volumes:
      - .:/app
    command: sh -c "pip install --no-cache-dir -r requirements.txt && python -m etl.main"
    depends_on:
      dw:
        condition: service_healthy
    restart: "no"

  metabase:
    image: metabase/metabase:v0.62.3.2
    container_name: ecci_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: h2
      # Metabase trata MB_DB_FILE como directorio y crea metabase.db.mv.db adentro
      # -> el H2 versionado vive en ./metabase-data/metabase.db/.
      MB_DB_FILE: /metabase-data/metabase.db
    volumes:
      - ./metabase-data:/metabase-data
    depends_on:
      dw:
        condition: service_healthy
      etl:
        condition: service_completed_successfully

volumes:
  dw_data:
