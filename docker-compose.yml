services:
  dw:
    image: postgres:16-alpine
    container_name: ecci_dw
    environment:
      POSTGRES_DB: ecci_dw
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    ports:
      - "5432:5432"
    volumes:
      - dw_data:/var/lib/postgresql/data
      - ./sql/ddl:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d ecci_dw"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase-db-init:
    image: postgres:16-alpine
    environment:
      PGHOST: ecci_dw
      PGPORT: 5432
      PGUSER: etl_user
      PGPASSWORD: etl_pass
    depends_on:
      dw:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        if ! psql -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname = 'metabase'" | grep -q 1; then
          createdb metabase
        fi

  metabase:
    image: metabase/metabase:latest
    container_name: ecci_metabase
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: etl_user
      MB_DB_PASS: etl_pass
      MB_DB_HOST: ecci_dw
    depends_on:
      metabase-db-init:
        condition: service_completed_successfully

volumes:
  dw_data:
